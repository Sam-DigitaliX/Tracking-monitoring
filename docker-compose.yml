services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trackguard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trackguard}
      POSTGRES_DB: ${POSTGRES_DB:-trackguard}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trackguard}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-trackguard}:${POSTGRES_PASSWORD:-trackguard}@db:5432/${POSTGRES_DB:-trackguard}"
      PYTHONPATH: /app
      APP_ENV: "production"
      SECRET_KEY: "${SECRET_KEY:-change-me-in-production}"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-http://localhost:3000}"
      SLACK_WEBHOOK_URL: "${SLACK_WEBHOOK_URL:-}"
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASSWORD: "${SMTP_PASSWORD:-}"
      SMTP_FROM: "${SMTP_FROM:-alerts@trackguard.local}"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-http://backend:8000/api}"
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
