services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: trackguard
      POSTGRES_PASSWORD: trackguard
      POSTGRES_DB: trackguard
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trackguard"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://trackguard:trackguard@db:5432/trackguard"
      APP_ENV: "production"
    command:
      - sh
      - -c
      - |
        echo "=== TrackGuard Debug ==="
        echo "PWD: $$(pwd)"
        echo "Files in /app/app/:"
        ls -la /app/app/ 2>&1 || echo "ERROR: /app/app/ not found"
        echo "Python import test:"
        python -c "import app.main; print('OK: import successful')" 2>&1 || { echo "FATAL: import failed"; exit 1; }
        echo "Starting uvicorn..."
        exec uvicorn app.main:app --host 0.0.0.0 --port 8000
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
