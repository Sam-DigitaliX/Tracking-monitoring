services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: trackguard
      POSTGRES_PASSWORD: trackguard
      POSTGRES_DB: trackguard
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trackguard"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app

volumes:
  pgdata:
