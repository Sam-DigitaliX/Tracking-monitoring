services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: trackguard
      POSTGRES_PASSWORD: trackguard
      POSTGRES_DB: trackguard
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trackguard"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://trackguard:trackguard@db:5432/trackguard"
      APP_ENV: "production"
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
      - ./backend/entrypoint.sh:/entrypoint.sh
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
