<!-- ============================================================
     Probr.io — BookStack Custom Theme (Minimal)
     Paste this into: Settings > Customization > Custom HTML Head Content
     ============================================================ -->

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
/* ================================================================
   0. CSS CUSTOM PROPERTIES — Probr Design Tokens
   ================================================================ */
:root {
  --probr-purple: #833AB4;
  --probr-red:    #FD1D1D;
  --probr-orange: #FCB045;
  --probr-gradient: linear-gradient(135deg, #833AB4, #FD1D1D, #FCB045);
  --card-bg: #fff;

  --radius-sm: 8px;
  --radius-md: 10px;
  --radius-lg: 12px;
  --radius-xl: 16px;

  --transition-fast: 150ms ease;
  --transition-base: 250ms ease;
}

.dark-mode {
  --card-bg: #222;
}

/* ================================================================
   1. TYPOGRAPHY
   ================================================================ */
body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif !important;
  -webkit-font-smoothing: antialiased;
}

h1, h2, h3, h4, h5, h6,
.shelf-name, .book-name,
.entity-list-item .entity-list-item--name,
.card h2 a, .card h3 a,
.grid-card .grid-card-content a {
  font-family: 'Space Grotesk', 'Inter', system-ui, sans-serif !important;
}

h1 { font-weight: 700 !important; }
h2 { font-weight: 600 !important; }

.page-content {
  line-height: 1.75 !important;
}

/* ================================================================
   2. BRAND GRADIENT ACCENTS — small touches only
   ================================================================ */

/* Gradient line at the very top of the header */
header::before, .header::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: var(--probr-gradient);
  z-index: 100;
  pointer-events: none;
}
header, .header {
  position: relative;
}

/* Primary buttons — brand gradient */
.button.primary,
button.primary,
.btn-primary,
input[type="submit"].primary,
a.button.primary {
  background: var(--probr-gradient) !important;
  border: none !important;
  color: white !important;
  font-family: 'Space Grotesk', 'Inter', system-ui, sans-serif !important;
  font-weight: 600 !important;
  border-radius: var(--radius-md) !important;
  box-shadow: 0 2px 12px rgba(131, 58, 180, 0.25) !important;
  transition: transform var(--transition-fast),
              box-shadow var(--transition-fast),
              filter var(--transition-fast) !important;
  text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
}

.button.primary:hover,
button.primary:hover,
.btn-primary:hover {
  transform: translateY(-1px) !important;
  box-shadow: 0 4px 20px rgba(131, 58, 180, 0.35) !important;
  filter: brightness(1.1) !important;
}

.button.primary:active,
button.primary:active {
  transform: translateY(0) !important;
  filter: brightness(0.95) !important;
}

/* Page loading bar — brand gradient */
#nprogress .bar {
  background: var(--probr-gradient) !important;
}

/* Spinner */
.loading-container .spinner {
  border-color: rgba(131, 58, 180, 0.2) !important;
  border-top-color: var(--probr-purple) !important;
}

/* Selection highlight */
::selection {
  background: rgba(131, 58, 180, 0.3);
  color: white;
}

/* Checkbox accent */
input[type="checkbox"]:checked {
  accent-color: var(--probr-purple) !important;
}

/* ================================================================
   3. BORDER RADIUS — rounded everywhere
   ================================================================ */

/* Gradient border on cards — background double-layer technique
   Inner layer (padding-box) = card background color
   Outer layer (border-box)  = Probr gradient
   No pseudo-element needed, border-radius works natively. */
.card,
.grid-card,
.bookshelf-grid .grid-card,
.book-grid .grid-card,
.content-panel {
  border: 1px solid transparent !important;
  border-radius: var(--radius-lg) !important;
  background:
    linear-gradient(var(--card-bg), var(--card-bg)) padding-box,
    var(--probr-gradient) border-box !important;
  overflow: hidden !important;
}

.button, button, .btn, a.button,
input[type="text"], input[type="email"], input[type="password"],
input[type="search"], input[type="url"], input[type="number"],
select, textarea {
  border-radius: var(--radius-md) !important;
}

/* Reset — keep header/toolbar/mobile buttons square */
header button,
header .button,
.header button,
.header .button,
.toolbar button,
.mobile-menu-toggle,
.tri-layout-mobile-tabs button,
.tri-layout-mobile-tabs .tab-item,
.icon-button,
.setting-list button,
.entity-actions button,
[refs="header-mobile-toggle"],
.breadcrumb-listing-toggle {
  border-radius: 0 !important;
}

.dropdown-menu,
.popup-body,
[class*="dropdown"] ul {
  border-radius: var(--radius-md) !important;
}

.popup-body,
.modal-content,
[overlay] .popup-body {
  border-radius: var(--radius-xl) !important;
}

.notification, .alert, .callout {
  border-radius: var(--radius-md) !important;
}

.page-content img {
  border-radius: var(--radius-md) !important;
}

.entity-list-item,
.entity-list-item-basic {
  border-radius: var(--radius-sm) !important;
}

/* ================================================================
   4. FOCUS RINGS — purple accent
   ================================================================ */
input:focus,
select:focus,
textarea:focus {
  border-color: rgba(131, 58, 180, 0.5) !important;
  box-shadow: 0 0 0 3px rgba(131, 58, 180, 0.12) !important;
  outline: none !important;
}

/* ================================================================
   5. GRADIENT BORDER ACCENTS — subtle touches
   ================================================================ */

/* Blockquote left border */
blockquote, .page-content blockquote {
  border-left: 3px solid var(--probr-purple) !important;
}

/* Page heading separator */
.page-content h2 {
  padding-bottom: 0.3em !important;
}

/* Tags — pill style with purple tint */
.tag-item,
.tag-name,
span.tag {
  background: rgba(131, 58, 180, 0.10) !important;
  border: 1px solid rgba(131, 58, 180, 0.20) !important;
  color: #9333ea !important;
  border-radius: 9999px !important;
  font-size: 0.75em !important;
  padding: 2px 10px !important;
  font-weight: 500 !important;
}

/* Dark mode tag color adjustment */
.dark-mode .tag-item,
.dark-mode .tag-name,
.dark-mode span.tag {
  color: #c084fc !important;
}

/* Inline code — purple tint */
code {
  background: rgba(131, 58, 180, 0.08) !important;
  padding: 2px 6px !important;
  border-radius: 4px !important;
  font-family: ui-monospace, 'Cascadia Code', 'Fira Code', monospace !important;
  font-size: 0.9em !important;
}

.dark-mode code {
  background: rgba(131, 58, 180, 0.15) !important;
  color: #c084fc !important;
}

/* Code blocks */
pre {
  border-radius: var(--radius-md) !important;
  padding: 16px 20px !important;
}

pre code {
  background: transparent !important;
  padding: 0 !important;
}

/* ================================================================
   6. DARK MODE SCROLLBAR
   ================================================================ */
.dark-mode ::-webkit-scrollbar {
  width: 8px;
  height: 8px;
}

.dark-mode ::-webkit-scrollbar-track {
  background: transparent;
}

.dark-mode ::-webkit-scrollbar-thumb {
  background: rgba(255, 255, 255, 0.12);
  border-radius: 4px;
}

.dark-mode ::-webkit-scrollbar-thumb:hover {
  background: rgba(255, 255, 255, 0.20);
}

.dark-mode * {
  scrollbar-width: thin;
  scrollbar-color: rgba(255, 255, 255, 0.12) transparent;
}

/* ================================================================
   7. CUSTOM NAV — DigitaliX-style pill navigation + dropdown
   ================================================================ */

/* Nav pill container — injected into BookStack header */
.probr-nav {
  display: flex;
  align-items: center;
  border-radius: 9999px;
  border: 1px solid rgba(0, 0, 0, 0.10);
  background: rgba(0, 0, 0, 0.04);
  padding: 3px;
  gap: 2px;
  font-family: 'Inter', system-ui, sans-serif;
  margin: 0 16px;
}

.dark-mode .probr-nav {
  border-color: rgba(255, 255, 255, 0.12);
  background: rgba(255, 255, 255, 0.07);
}

/* Nav item — pill shape inside the pill */
.probr-nav-item {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 7px 16px;
  border-radius: 9999px;
  font-size: 13px;
  font-weight: 500;
  color: rgba(0, 0, 0, 0.55);
  text-decoration: none !important;
  white-space: nowrap;
  cursor: pointer;
  border: none;
  background: transparent;
  transition: background 200ms ease, color 200ms ease;
  line-height: 1.4;
}

.probr-nav-item:hover {
  color: rgba(0, 0, 0, 0.85);
  background: rgba(0, 0, 0, 0.05);
  text-decoration: none !important;
}

.probr-nav-item.active {
  background: rgba(0, 0, 0, 0.08);
  color: rgba(0, 0, 0, 0.90);
}

.dark-mode .probr-nav-item {
  color: rgba(255, 255, 255, 0.55);
}

.dark-mode .probr-nav-item:hover {
  color: rgba(255, 255, 255, 0.90);
  background: rgba(255, 255, 255, 0.06);
}

.dark-mode .probr-nav-item.active {
  background: rgba(255, 255, 255, 0.08);
  color: rgba(255, 255, 255, 0.95);
}

/* Chevron rotation */
.probr-nav-item .probr-chevron {
  width: 14px;
  height: 14px;
  transition: transform 200ms ease;
  opacity: 0.6;
}

.probr-nav-item[aria-expanded="true"] .probr-chevron {
  transform: rotate(180deg);
}

/* ─── Dropdown panel — mega menu ─── */
.probr-dropdown-wrapper {
  position: relative;
}

.probr-dropdown {
  position: absolute;
  top: calc(100% + 8px);
  left: 50%;
  transform: translateX(-50%) translateY(-4px);
  min-width: 320px;
  border-radius: 16px;
  border: 1px solid rgba(0, 0, 0, 0.08);
  background: #fff;
  box-shadow: 0 20px 50px rgba(0, 0, 0, 0.12), 0 4px 12px rgba(0, 0, 0, 0.06);
  padding: 8px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 200ms ease, transform 200ms ease;
  z-index: 999;
}

.probr-dropdown.open {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
  pointer-events: auto;
}

.dark-mode .probr-dropdown {
  border-color: rgba(255, 255, 255, 0.08);
  background: rgba(12, 12, 24, 0.95);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  box-shadow: 0 25px 50px rgba(0, 0, 0, 0.40);
}

/* Dropdown section label */
.probr-dropdown-label {
  padding: 10px 14px 8px;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: rgba(0, 0, 0, 0.40);
}

.dark-mode .probr-dropdown-label {
  color: rgba(255, 255, 255, 0.40);
}

/* Dropdown link — icon + label + description */
.probr-mega-link {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 12px 14px;
  border-radius: 12px;
  text-decoration: none !important;
  color: inherit !important;
  transition: background 200ms ease;
}

.probr-mega-link:hover {
  background: rgba(0, 0, 0, 0.04);
  text-decoration: none !important;
}

.dark-mode .probr-mega-link:hover {
  background: rgba(255, 255, 255, 0.04);
}

/* Icon circle */
.probr-mega-link .probr-link-icon {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 40px;
  height: 40px;
  border-radius: 10px;
  background: rgba(131, 58, 180, 0.08);
  border: 1px solid rgba(131, 58, 180, 0.12);
  flex-shrink: 0;
  transition: background 300ms ease, border-color 300ms ease;
}

.probr-mega-link .probr-link-icon svg {
  width: 18px;
  height: 18px;
  stroke: var(--probr-purple);
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.probr-mega-link:hover .probr-link-icon {
  background: var(--probr-gradient);
  border-color: transparent;
}

.probr-mega-link:hover .probr-link-icon svg {
  stroke: #fff;
}

.dark-mode .probr-mega-link .probr-link-icon {
  background: rgba(255, 255, 255, 0.05);
  border-color: rgba(255, 255, 255, 0.06);
}

/* Text block */
.probr-mega-link .probr-link-text {
  flex: 1;
  min-width: 0;
}

.probr-mega-link .probr-link-title {
  font-size: 13px;
  font-weight: 600;
  color: rgba(0, 0, 0, 0.85);
  line-height: 1.3;
}

.dark-mode .probr-mega-link .probr-link-title {
  color: rgba(255, 255, 255, 0.92);
}

.probr-mega-link .probr-link-desc {
  font-size: 12px;
  color: rgba(0, 0, 0, 0.45);
  margin-top: 2px;
  line-height: 1.3;
}

.dark-mode .probr-mega-link .probr-link-desc {
  color: rgba(255, 255, 255, 0.45);
}

/* External link indicator */
.probr-mega-link .probr-external-icon {
  width: 14px;
  height: 14px;
  opacity: 0.35;
  flex-shrink: 0;
}

/* Dropdown separator */
.probr-dropdown-sep {
  height: 1px;
  background: rgba(0, 0, 0, 0.06);
  margin: 4px 8px;
}

.dark-mode .probr-dropdown-sep {
  background: rgba(255, 255, 255, 0.06);
}

/* ─── Responsive — hide nav pill on small screens ─── */
@media (max-width: 900px) {
  .probr-nav {
    display: none;
  }
}
</style>

<!-- ============================================================
     Custom Navigation — DigitaliX-style pill nav + dropdown
     ============================================================ -->
<script>
document.addEventListener('DOMContentLoaded', function () {

  /* ── SVG icon paths (Lucide-style, 24×24 viewBox) ── */
  var icons = {
    book:      '<path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/>',
    fileText:  '<path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/>',
    github:    '<path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/><path d="M9 18c-4.51 2-5-2-7-2"/>',
    external:  '<path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>',
    chevDown:  '<polyline points="6 9 12 15 18 9"/>',
    home:      '<path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>',
    shelves:   '<path d="M16 6l3 3-8 8-4-1 1-4 8-8z"/><path d="M2 20h20"/>',
    monitor:   '<rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>'
  };

  function svgIcon(name) {
    return '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' + icons[name] + '</svg>';
  }

  /* ── Build the nav pill ── */
  var nav = document.createElement('nav');
  nav.className = 'probr-nav';

  /* Home link */
  nav.innerHTML =
    '<a class="probr-nav-item" href="/">' +
      svgIcon('home').replace('width="24"','width="15"').replace('height="24"','height="15"') +
      ' Accueil</a>' +

    /* Shelves link */
    '<a class="probr-nav-item" href="/shelves">Bibliothèque</a>' +

    /* Ressources dropdown trigger */
    '<div class="probr-dropdown-wrapper">' +
      '<button class="probr-nav-item" id="probr-res-trigger" aria-expanded="false" type="button">' +
        'Ressources ' +
        '<svg class="probr-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' + icons.chevDown + '</svg>' +
      '</button>' +
      '<div class="probr-dropdown" id="probr-res-dropdown">' +
        '<div class="probr-dropdown-label">Ressources</div>' +

        /* Docs link — opens in new tab */
        '<a class="probr-mega-link" href="https://github.com/Sam-DigitaliX/digitalix-launchpad" target="_blank" rel="noopener noreferrer">' +
          '<span class="probr-link-icon">' + svgIcon('github') + '</span>' +
          '<span class="probr-link-text">' +
            '<span class="probr-link-title">Documentation</span>' +
            '<span class="probr-link-desc">Guides & launchpad DigitaliX</span>' +
          '</span>' +
          '<svg class="probr-external-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' + icons.external + '</svg>' +
        '</a>' +

        '<div class="probr-dropdown-sep"></div>' +

        /* All books */
        '<a class="probr-mega-link" href="/books">' +
          '<span class="probr-link-icon">' + svgIcon('book') + '</span>' +
          '<span class="probr-link-text">' +
            '<span class="probr-link-title">Tous les livres</span>' +
            '<span class="probr-link-desc">Parcourir la base de connaissances</span>' +
          '</span>' +
        '</a>' +

        /* All pages */
        '<a class="probr-mega-link" href="/search">' +
          '<span class="probr-link-icon">' + svgIcon('fileText') + '</span>' +
          '<span class="probr-link-text">' +
            '<span class="probr-link-title">Rechercher</span>' +
            '<span class="probr-link-desc">Trouver une page ou un article</span>' +
          '</span>' +
        '</a>' +

      '</div>' +
    '</div>';

  /* ── Inject into BookStack header ── */
  var headerRight = document.querySelector('header .header-links, .header .header-links');
  if (headerRight) {
    headerRight.parentNode.insertBefore(nav, headerRight);
  } else {
    /* Fallback: append to the header's inner container */
    var headerInner = document.querySelector('header .container, header > div');
    if (headerInner) {
      headerInner.appendChild(nav);
    }
  }

  /* ── Dropdown open/close logic (hover + click, DigitaliX-style) ── */
  var trigger = document.getElementById('probr-res-trigger');
  var dropdown = document.getElementById('probr-res-dropdown');
  var wrapper = trigger ? trigger.parentElement : null;
  var closeTimeout;

  function openDropdown() {
    clearTimeout(closeTimeout);
    dropdown.classList.add('open');
    trigger.setAttribute('aria-expanded', 'true');
  }

  function scheduleClose() {
    closeTimeout = setTimeout(function () {
      dropdown.classList.remove('open');
      trigger.setAttribute('aria-expanded', 'false');
    }, 250);
  }

  if (trigger && dropdown && wrapper) {
    /* Hover */
    wrapper.addEventListener('mouseenter', openDropdown);
    wrapper.addEventListener('mouseleave', scheduleClose);

    /* Click toggle (mobile-friendly) */
    trigger.addEventListener('click', function (e) {
      e.stopPropagation();
      if (dropdown.classList.contains('open')) {
        dropdown.classList.remove('open');
        trigger.setAttribute('aria-expanded', 'false');
      } else {
        openDropdown();
      }
    });

    /* Close on outside click */
    document.addEventListener('click', function (e) {
      if (!wrapper.contains(e.target)) {
        dropdown.classList.remove('open');
        trigger.setAttribute('aria-expanded', 'false');
      }
    });

    /* Close on Escape */
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && dropdown.classList.contains('open')) {
        dropdown.classList.remove('open');
        trigger.setAttribute('aria-expanded', 'false');
        trigger.focus();
      }
    });
  }

  /* ── Mark active nav item based on current path ── */
  var path = window.location.pathname;
  var items = nav.querySelectorAll('.probr-nav-item[href]');
  items.forEach(function (item) {
    var href = item.getAttribute('href');
    if (href === '/' ? path === '/' : path.indexOf(href) === 0) {
      item.classList.add('active');
    }
  });

});
</script>
